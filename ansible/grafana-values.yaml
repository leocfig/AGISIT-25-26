adminPassword: "admin"
persistence:
  enabled: false
service:
  type: ClusterIP
ingress:
  enabled: true
  path: /grafana
  pathType: Prefix
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - app.35.195.32.171.nip.io
grafana.ini:
  server:
    root_url: "%(protocol)s://%(domain)s/grafana"
    serve_from_sub_path: true
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-kube-prometheus-prometheus.default.svc.cluster.local:9090
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: 'Application Dashboards'
        orgId: 1
        folder: 'Application Monitoring'
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
dashboardsConfigMaps:
  default: grafana-dashboards
