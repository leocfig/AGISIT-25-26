global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'authservice'
    static_configs:
      - targets: ['authservice:8000']

  - job_name: 'messageservice'
    static_configs:
      - targets: ['messageservice:8000']

  - job_name: 'onlineservice'
    static_configs:
      - targets: ['onlineservice:8000']
